meta:
  product: "Carry-On Confidence"
  tagline: "Fake It Till You Make the Flight"
  organization: "Primo English"
  version: "1.0"
  created: "2026-07-11"
  created_by: "MODE: DEV (Claude Sonnet 4.6)"
  description: >
    Exercise type library for Carry-On Confidence — a scenario-driven, destination-aware
    ESL worksheet generator for Korean travelers. Defines all 10 exercise types with
    format specs, instruction lines, difficulty ranges, and tone notes. The LLM generates
    actual exercise content at runtime based on the worksheet topic, destination, level,
    and fetched Korean travel data. This file defines structure only — no static content.
  notes:
    - "No answer keys are produced for any exercise type. Answers are open, subjective,
      and relative. Discussion is teacher-led."
    - "All exercise content must be topic-matched to the worksheet scenario."
    - "Generation rules: minimum 4 distinct types per worksheet, maximum 2 instances
      per type, 8 exercises per worksheet (configurable)."
    - "Exercise count is configurable. Default: 8. Reduce to 6 after initial evaluation."

generation_rules:
  exercises_per_worksheet: 8
  min_distinct_types: 4
  max_instances_per_type: 2
  answer_keys: false
  topic_matching: strict
  note: >
    Generator selects eligible types based on difficulty_min and difficulty_max
    against the target Primo Scale level. All selected exercises must be grounded
    in the worksheet topic and destination. Repeats of a type must produce
    meaningfully different content — not variations of the same scenario.

exercises:

  - id: coc_001
    type: what_do_you_say_when
    display_name: "What Do You Say When...?"
    difficulty_min: 1
    difficulty_max: 10
    keyword_requirement: encouraged
    item_count: 1
    estimated_lines: 5
    instructions: "Read the situation. Write what you would say in English."
    student_response_format: "1–3 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      Situation must feel real and slightly stressful — grounded in the worksheet
      topic. Prompt should put the student in the moment, not describe it from a
      distance. At levels 1–2, keep the scenario simple and the stakes low.
      At higher levels, increase ambiguity and pressure.
    format: |
      ✈️ WHAT DO YOU SAY WHEN...?

      [1–2 sentence scenario placing the student in the moment]

      What do you say?
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_002
    type: polish_the_panic
    display_name: "Polish the Panic"
    difficulty_min: 3
    difficulty_max: 9
    keyword_requirement: "no"
    item_count: 1
    estimated_lines: 5
    instructions: "Read the panicked statement. Rewrite it as a natural, confident English sentence."
    student_response_format: "1–2 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      The panicked version must sound authentically Korean — broken grammar, awkward
      word order, or Korean sentence structure mapped directly onto English. Not
      random gibberish. The student should recognise it immediately as something
      they or a classmate might actually say. Never invented nonsense.
    format: |
      😅 POLISH THE PANIC

      "[panicked English statement]"

      Rewrite this as a natural, confident English sentence:
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_003
    type: lost_in_translation
    display_name: "Lost in Translation"
    difficulty_min: 4
    difficulty_max: 10
    keyword_requirement: "no"
    item_count: 1
    estimated_lines: 7
    instructions: "A Korean traveler said this in English. What is wrong with it? Write a more natural version below."
    student_response_format: "Two blanks — one for identifying the problem, one for the natural fix"
    answer_key: false
    tone_note: >
      The phrase must be something a Korean learner would plausibly produce — a direct
      translation from Korean, a politeness register error, or a culturally mismatched
      expression. Never invented nonsense. The problem should be identifiable by a
      student at the target level — not a trick, not obscure.
    format: |
      🔤 LOST IN TRANSLATION

      A Korean traveler said: "[plausible but wrong English phrase]"

      What is wrong with this?
      _______________________________________________________________

      Write a more natural version:
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_004
    type: fill_the_silence
    display_name: "Fill the Silence"
    difficulty_min: 1
    difficulty_max: 8
    keyword_requirement: encouraged
    item_count: 1
    estimated_lines: 5
    instructions: "The conversation has stalled. Write what you would say next to keep it going."
    student_response_format: "1–3 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      The stall moment should feel natural and human — an awkward pause, a throwaway
      comment, an unexpected question. Not a dramatic crisis. The student's job is to
      keep the conversation alive, not resolve a problem. At lower levels, the setup
      should be simple and the expected response minimal. At higher levels, the silence
      should carry more social weight.
    format: |
      🤐 FILL THE SILENCE

      [Context: where you are and who you're talking to]
      [Other person's line that has created a natural pause]

      What do you say next?
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_005
    type: survival_dialogue_completion
    display_name: "Survival Dialogue Completion"
    difficulty_min: 1
    difficulty_max: 7
    keyword_requirement: "yes"
    item_count: 1
    estimated_lines: 10
    instructions: "Complete the dialogue. Fill in your lines using at least one keyword from this worksheet."
    student_response_format: "Two blanks inserted at the student's turns only — all other lines are provided"
    answer_key: false
    tone_note: >
      Dialogue must be realistic and tight — no filler lines. Exactly 2 of the
      student's turns are left blank. The other party's lines are complete and
      provided. Gaps must be at moments where a real traveler needs to produce
      something meaningful — not just yes or no. At least one blank must naturally
      invite use of a worksheet keyword.
    format: |
      💬 SURVIVAL DIALOGUE COMPLETION

      [Other person's name/role]: "[line]"
      You: _______________________________________________________________
      [Other person's name/role]: "[line]"
      You: "[provided — student does not fill this in]"
      [Other person's name/role]: "[line]"
      You: _______________________________________________________________

      Remember to use at least one keyword from this worksheet!

  - id: coc_006
    type: cultural_misunderstanding_fix_it
    display_name: "Cultural Misunderstanding Fix-It"
    difficulty_min: 5
    difficulty_max: 10
    keyword_requirement: "no"
    item_count: 1
    estimated_lines: 8
    instructions: "Read what happened. What went wrong? What should this traveler have done instead?"
    student_response_format: "Open paragraph response in the blank provided"
    answer_key: false
    tone_note: >
      Scenarios must be very Korean — the traveler's behaviour must stem from genuine
      Korean cultural norms applied sincerely in the wrong context. Humour and mild
      absurdity are encouraged. The traveler should never be the villain — just
      confidently, sincerely wrong. Think: excessive politeness, gift-giving customs,
      age-based deference, indirect refusal, or Confucian hierarchy logic applied
      abroad. The more recognisable the Korean behaviour, the better.
    format: |
      🤦 CULTURAL MISUNDERSTANDING FIX-IT

      [3–5 sentence story describing a very Korean cultural behaviour applied in the
      wrong overseas context — humorous, absurd where appropriate, never cruel]

      What went wrong? What should this traveler have done instead?
      _______________________________________________________________
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_007
    type: the_upgrade_attempt
    display_name: "The Upgrade Attempt"
    difficulty_min: 3
    difficulty_max: 9
    keyword_requirement: encouraged
    item_count: 1
    estimated_lines: 5
    instructions: "Read the basic sentence. Rewrite it to sound more natural, confident, or polite — without changing the meaning."
    student_response_format: "1–2 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      The basic sentence must be something a Korean learner would actually produce —
      functional but flat, overly literal, or missing register. Not broken English —
      it must be grammatically acceptable but clearly not natural. The upgrade should
      feel achievable at the target level. At higher levels, the gap between basic
      and natural should be more subtle — register, tone, or idiomatic choice rather
      than obvious grammar.
    format: |
      ⬆️ THE UPGRADE ATTEMPT

      Basic: "[functional but flat English sentence]"

      Upgraded version:
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_008
    type: what_went_wrong
    display_name: "What Went Wrong?"
    difficulty_min: 4
    difficulty_max: 10
    keyword_requirement: "no"
    item_count: 1
    estimated_lines: 9
    instructions: "Read the story. What was the key communication mistake? Write what this traveler should have said or done differently."
    student_response_format: "1–3 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      Stories must be absurd, humorous, and grounded in situations Koreans would
      immediately recognise. The traveler's suffering must be entirely self-inflicted
      through communication failure — not bad luck, not other people's fault.
      Classic patterns: catastrophically over-indirect, too polite to ask for help,
      avoidant to the point of disaster, literal to the point of confusion, or
      paralysed by not wanting to cause 눈치 problems. Maximum relatable cringe.
      The student should finish reading and think "I would have done the same thing."
    format: |
      😬 WHAT WENT WRONG?

      [3–5 sentence story: absurd, humorous, relatable Korean traveler situation
      that ended badly due to a communication failure]

      What was the key communication mistake?
      What should this traveler have said or done differently?
      _______________________________________________________________
      _______________________________________________________________

  - id: coc_009
    type: emergency_script
    display_name: "Emergency Script"
    difficulty_min: 1
    difficulty_max: 5
    keyword_requirement: "yes"
    item_count: 1
    estimated_lines: 5
    instructions: "Read the emergency. Write exactly what you would say — keep it short, clear, and direct."
    student_response_format: "2–3 sentences written in the blank provided"
    answer_key: false
    tone_note: >
      Scenario must be urgent but survivable — a real situation a traveler could face.
      No dramatics. The student's job is clarity and brevity, not eloquence. At levels
      1–2, the scenario should be simple and the expected response minimal — a few
      key words in the right order is a win. At levels 4–5, the scenario can have
      slightly more complexity but the output is still short. Must naturally invite
      use of at least one worksheet keyword.
    format: |
      🚨 EMERGENCY SCRIPT

      [1–2 sentence scenario: urgent, real, survivable situation at the destination]

      Write exactly what you would say (2–3 sentences):
      _______________________________________________________________
      _______________________________________________________________

      Tip: Use at least one keyword from this worksheet!

  - id: coc_010
    type: read_the_room
    display_name: "Read the Room"
    difficulty_min: 7
    difficulty_max: 10
    keyword_requirement: "no"
    item_count: 1
    estimated_lines: 7
    instructions: "Read the situation. What is this person really telling you? How would you respond?"
    student_response_format: "Two blanks — one for subtext interpretation, one for the student's response"
    answer_key: false
    tone_note: >
      The subtext must be genuinely indirect — British understatement, American
      customer-service politeness masking a complaint, host social signals, or
      professional register concealing real intent. Not a trick question. The indirect
      meaning should be fair and readable by an advanced student. Situations should
      feel real — social settings, professional encounters, service interactions.
      Avoid anything culturally obscure or region-specific to the point of unfairness.
    format: |
      👀 READ THE ROOM

      [Context: where you are and who is speaking]
      "[Indirect English statement with meaningful subtext]"

      What is this person really telling you?
      _______________________________________________________________

      How would you respond?
      _______________________________________________________________
      _______________________________________________________________
