# llm.yaml — Carry-On Confidence
# LLM provider configuration.
# OpenRouter is the only supported provider. Do not add other providers.
# Key NAMES only — never key values. All values live in .env

provider: "openrouter"

openrouter:
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  api_key_env: "OPENROUTER_API_KEY"
  model: "qwen/qwen3-235b-a22b"
  timeout: 120             # seconds — worksheet generation prompts are long
  generation:
    max_tokens: 4000
    temperature: 0.8       # moderate creativity — scenarios should feel fresh but coherent
    note: "Temperature and max_tokens are starting values. Tune in Phase 2 during prompt development."
